web:
  port: 8091

endpoints:
  - name: pihole-web
    url: "http://127.0.0.1/" # FIXME works only because we share the network with the host
    method: GET
    conditions:
      - "[STATUS] == 200"
    interval: 3m
  - name: pihole-dns
    url: "127.0.0.1" # FIXME works only because we share the network with the host
    dns:
      query-name: "valhalla.midgard.lan"
      query-type: "A"
    conditions:
      - "[BODY] == 192.168.1.123"
      - "[DNS_RCODE] == NOERROR"
